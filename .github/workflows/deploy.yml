name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # '/portafolio' for a project repo, '' if the repo is renamed to
      # NataliaVillegasC.github.io — no config change needed either way.
      - name: Compute base path
        id: base
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Build all apps
        run: npm run build
        env:
          BASE_PATH: ${{ steps.base.outputs.path }}

      - name: Assemble merged site (webpage at /, cv at /cv, resume at /resume)
        run: |
          mkdir -p site/cv site/resume
          cp -r webpage/out/. site/
          cp -r cv/build/. site/cv/
          cp -r resume/build/. site/resume/
          touch site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
